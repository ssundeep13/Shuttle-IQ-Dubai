<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ShuttleIQ — Book Badminton Sessions in UAE</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0d2b45" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShuttleIQ" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- SEO -->
    <meta name="description" content="Book badminton sessions across the UAE. Live rankings, ELO skill ratings, smart matchmaking, and real-time queue management. Join the community at ShuttleIQ." />
    <meta name="application-name" content="ShuttleIQ" />
    <meta name="keywords" content="badminton, UAE, Dubai, book sessions, sports booking, player rankings, skill rating, matchmaking" />
    <link rel="canonical" href="https://shuttleiq.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShuttleIQ" />
    <meta property="og:title" content="ShuttleIQ — Book Badminton Sessions in UAE" />
    <meta property="og:description" content="Book badminton sessions across the UAE. Live rankings, ELO skill ratings, smart matchmaking, and real-time queue management." />
    <meta property="og:image" content="https://shuttleiq.org/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://shuttleiq.org/icons/icon-512x512.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsActivityLocation",
      "name": "ShuttleIQ",
      "description": "Book badminton sessions across the UAE. Live rankings, ELO skill ratings, smart matchmaking, and real-time queue management.",
      "url": "https://shuttleiq.org",
      "sport": "Badminton",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "AE"
      },
      "potentialAction": {
        "@type": "ReserveAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://shuttleiq.org/marketplace/book"
        },
        "result": {
          "@type": "Reservation",
          "name": "Badminton Session Booking"
        }
      }
    }
    </script>
